version: '3.8'

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: multi_agent_analyst_dev
    restart: always
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./src:/app/src
      - ./tests:/app/tests
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
