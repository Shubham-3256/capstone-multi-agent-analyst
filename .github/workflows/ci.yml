name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install System Dependencies (WeasyPrint & Cairo)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcairo2 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libgdk-pixbuf2.0-0 \
          shared-mime-info \
          fonts-dejavu \
          fonts-liberation

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Lint with Ruff
      run: ruff check src app tests

    - name: Format Check with Black
      run: black --check src app tests

    - name: Type Check with Mypy
      run: mypy src app

    - name: Run Tests with Coverage
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        pytest --cov=src --cov-report=xml --cov-report=term-missing

    - name: Run Benchmark Smoke Test
      run: |
        python benchmarks/run_benchmarks.py --smoke

    - name: Upload Test Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmarks/metrics.json
